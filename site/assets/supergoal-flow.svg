<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 620" role="img" aria-labelledby="title desc">
  <title id="title">Supergoal autonomous workflow diagram</title>
  <desc id="desc">A flow from /supergoal planning through run.json, one /goal paste, gated phase execution, recovery, final audit, report, and completion.</desc>
  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#111827" flood-opacity=".12"/>
    </filter>
    <linearGradient id="line" x1="70" x2="970" y1="310" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset=".52" stop-color="#12b886"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  <rect width="1040" height="620" rx="32" fill="#f7fafc"/>
  <path d="M90 314h860" fill="none" stroke="url(#line)" stroke-width="8" stroke-linecap="round"/>
  <g fill="none" stroke="#cbd5e1" stroke-width="1">
    <path d="M105 110h830M105 510h830M105 190h830M105 430h830"/>
    <path d="M185 88v444M345 88v444M505 88v444M665 88v444M825 88v444"/>
  </g>
  <g filter="url(#soft-shadow)">
    <rect x="70" y="130" width="210" height="170" rx="20" fill="#ffffff" stroke="#d8e0eb"/>
    <rect x="78" y="138" width="194" height="28" rx="12" fill="#111827"/>
    <circle cx="98" cy="152" r="4" fill="#ef4444"/>
    <circle cx="114" cy="152" r="4" fill="#f59e0b"/>
    <circle cx="130" cy="152" r="4" fill="#22c55e"/>
    <text x="98" y="204" fill="#111827" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="700">/supergoal</text>
    <text x="98" y="236" fill="#526174" font-family="Inter, Arial, sans-serif" font-size="16">Intake, memory,</text>
    <text x="98" y="260" fill="#526174" font-family="Inter, Arial, sans-serif" font-size="16">repo recon, risks.</text>
  </g>
  <g filter="url(#soft-shadow)">
    <rect x="320" y="92" width="220" height="180" rx="20" fill="#ffffff" stroke="#d8e0eb"/>
    <text x="350" y="144" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Run kernel</text>
    <text x="350" y="184" fill="#2563eb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">run.json</text>
    <text x="350" y="214" fill="#12b886" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">events.jsonl</text>
    <text x="350" y="244" fill="#f59e0b" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17">evidence/</text>
  </g>
  <g filter="url(#soft-shadow)">
    <rect x="565" y="150" width="190" height="166" rx="20" fill="#111827"/>
    <text x="596" y="205" fill="#69e6bd" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" font-weight="800">/goal</text>
    <text x="596" y="240" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="16">Paste once.</text>
    <text x="596" y="266" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="16">Run continues.</text>
  </g>
  <g filter="url(#soft-shadow)">
    <rect x="790" y="102" width="190" height="172" rx="20" fill="#ffffff" stroke="#d8e0eb"/>
    <text x="820" y="154" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Phase loop</text>
    <text x="820" y="192" fill="#526174" font-family="Inter, Arial, sans-serif" font-size="16">Do work</text>
    <text x="820" y="220" fill="#526174" font-family="Inter, Arial, sans-serif" font-size="16">Save evidence</text>
    <text x="820" y="248" fill="#526174" font-family="Inter, Arial, sans-serif" font-size="16">Gate phase</text>
  </g>
  <g filter="url(#soft-shadow)">
    <rect x="205" y="365" width="250" height="140" rx="20" fill="#ffffff" stroke="#d8e0eb"/>
    <text x="235" y="420" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Self-healing</text>
    <text x="235" y="456" fill="#526174" font-family="Inter, Arial, sans-serif" font-size="16">Retry, fix spec, or</text>
    <text x="235" y="482" fill="#526174" font-family="Inter, Arial, sans-serif" font-size="16">handoff after 3 strikes.</text>
  </g>
  <g filter="url(#soft-shadow)">
    <rect x="610" y="360" width="260" height="150" rx="20" fill="#ffffff" stroke="#d8e0eb"/>
    <text x="640" y="414" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Audit + report</text>
    <text x="640" y="450" fill="#526174" font-family="Inter, Arial, sans-serif" font-size="16">Check deliverables and</text>
    <text x="640" y="476" fill="#526174" font-family="Inter, Arial, sans-serif" font-size="16">write report.html.</text>
  </g>
  <g fill="#ffffff" stroke="#111827" stroke-width="5">
    <circle cx="70" cy="314" r="13"/>
    <circle cx="320" cy="314" r="13"/>
    <circle cx="565" cy="314" r="13"/>
    <circle cx="790" cy="314" r="13"/>
    <circle cx="950" cy="314" r="13"/>
  </g>
  <path d="m944 291 24 23-24 23" fill="none" stroke="#111827" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
